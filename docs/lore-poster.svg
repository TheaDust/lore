<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="lore — the memory of every project, kept where any agent can read it">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#1a2440"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fef3c7"/>
      <stop offset="0.6" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#92400e"/>
    </radialGradient>
    <linearGradient id="river" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.0"/>
      <stop offset="0.4" stop-color="#22d3ee" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.0"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1200" height="360" fill="url(#sky)"/>

  <!-- distant horizon mountains -->
  <path d="M0,260 L80,210 L160,240 L240,200 L340,250 L420,205 L520,245 L640,200 L760,250 L880,210 L1000,245 L1120,215 L1200,240 L1200,360 L0,360 Z"
        fill="#0f172a" opacity="0.85"/>
  <path d="M0,290 L120,250 L260,280 L380,245 L500,285 L640,255 L780,290 L920,250 L1060,290 L1200,260 L1200,360 L0,360 Z"
        fill="#0b1124"/>

  <!-- river of memory -->
  <path d="M-20,360 C200,300 400,330 600,310 C800,290 1000,330 1220,300 L1220,360 Z"
        fill="url(#river)"/>
  <g stroke="#67e8f9" stroke-width="0.6" opacity="0.35" fill="none">
    <path d="M0,335 C220,320 380,340 600,325 C820,310 980,340 1200,330"/>
    <path d="M0,348 C220,335 380,352 600,340 C820,328 980,352 1200,344"/>
  </g>

  <!-- moon -->
  <circle cx="940" cy="110" r="62" fill="url(#moon)"/>
  <circle cx="922" cy="96" r="6" fill="#92400e" opacity="0.35"/>
  <circle cx="958" cy="118" r="4" fill="#92400e" opacity="0.3"/>
  <circle cx="952" cy="92" r="3" fill="#92400e" opacity="0.25"/>

  <!-- stars -->
  <g fill="#fef9c3">
    <circle cx="120" cy="60" r="1.2"/>
    <circle cx="220" cy="40" r="0.8"/>
    <circle cx="340" cy="80" r="1.0"/>
    <circle cx="430" cy="50" r="1.4"/>
    <circle cx="540" cy="30" r="0.9"/>
    <circle cx="660" cy="70" r="1.1"/>
    <circle cx="740" cy="45" r="1.3"/>
    <circle cx="820" cy="55" r="0.7"/>
    <circle cx="1080" cy="40" r="1.2"/>
    <circle cx="1140" cy="70" r="0.9"/>
    <circle cx="280" cy="100" r="0.6"/>
    <circle cx="600" cy="55" r="0.8"/>
  </g>

  <!-- orbiting archives — one per scope -->
  <g transform="translate(940,110)">
    <ellipse cx="0" cy="0" rx="240" ry="46" fill="none" stroke="url(#warm)" stroke-width="1" opacity="0.55"/>
    <circle cx="-240" cy="0" r="5" fill="#f59e0b"/>
    <circle cx="-160" cy="0" r="5" fill="#fbbf24"/>
    <circle cx="-80"  cy="0" r="5" fill="#fde68a"/>
    <circle cx="0"    cy="0" r="5" fill="#fef3c7"/>
    <circle cx="80"   cy="0" r="5" fill="#fb923c"/>
    <circle cx="160"  cy="0" r="5" fill="#ef4444"/>
    <circle cx="240"  cy="0" r="5" fill="#dc2626"/>
  </g>

  <!-- lantern on the bank — the project -->
  <g transform="translate(160,250)">
    <path d="M-2,0 L-8,30 L8,30 L2,0 Z" fill="#1f2937"/>
    <rect x="-2" y="-2" width="4" height="2" fill="#1f2937"/>
    <ellipse cx="0" cy="22" rx="22" ry="6" fill="#fbbf24" opacity="0.25"/>
    <ellipse cx="0" cy="22" rx="14" ry="3" fill="#fde68a" opacity="0.55"/>
  </g>

  <!-- foreground text -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" fill="#f8fafc">
    <text x="60" y="118" font-size="76" font-weight="700" letter-spacing="-2">lore</text>
    <text x="62" y="148" font-size="18" fill="#cbd5e1">a long memory for short-lived agents</text>
    <text x="62" y="186" font-size="14" fill="#94a3b8">architecture · decisions · conventions — kept in plain Markdown</text>
    <text x="62" y="206" font-size="14" fill="#94a3b8">read by every agent that already knows your config files</text>
  </g>

  <!-- monorepo note bottom right -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#a5f3fc" font-size="12" opacity="0.85">
    <text x="900" y="332">.lore/  →  CLAUDE.md  .cursorrules  AGENTS.md …</text>
  </g>
</svg>